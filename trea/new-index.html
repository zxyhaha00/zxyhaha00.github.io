<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAE 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
            background-color: #000;
        }

        /* 导航栏 */
        .navbar {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
        .navbar .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        /* 所有导航链接：可点击、小手、hover绿 */
        .navbar .nav-links > a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
        }
        .navbar .nav-links > a:hover {
            color: #23d160;
        }
        .navbar .nav-actions {
            display: flex;
            gap: 16px;
        }
        .btn-login {
            background-color: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-download {
            background-color: #23d160;
            border: none;
            color: #000;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        /* 下拉菜单：关键修复！只包裹“产品”，不占宽度 */
        .drop-box {
            position: relative;
            display: inline-block; /* 只占内容宽度，不盖后面 */
            height: 60px;
            display: flex;
            align-items: center;
        }
        .drop-box > a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
        }
        .drop-box > a:hover {
            color: #23d160;
        }
        .drop-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #111;
            border-radius: 4px;
            padding: 12px;
            min-width: 260px;
            margin-top: 0; /* 紧贴，无间隙 */
            z-index: 101;
        }
        /* 关键：hover 父容器和菜单都保持显示 */
        .drop-box:hover .drop-menu,
        .drop-menu:hover {
            display: block;
        }
        .drop-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 6px;
            text-decoration: none;
            color: #fff;
            border-radius: 4px;
        }
        .drop-item:hover {
            background-color: #222;
        }
        .drop-icon {
            width: 48px;
            height: 48px;
            background-color: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .drop-text {
            flex: 1;
        }
        .drop-title {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .drop-new {
            background-color: #27c95c;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .drop-desc {
            color: #aaa;
            font-size: 13px;
            margin: 4px 0 0;
        }
        .drop-icons-row {
            display: flex;
            gap: 6px;
            opacity: 0.7;
        }

        /* Hero */
        .hero-section {
            background: url("图案.jpg") center/cover no-repeat;
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-end;
            padding: 60px 40px;
        }
        .hero-left {
            flex: 1;
        }
        .hero-left h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .hero-left p {
            font-size: 28px;
            opacity: 0.9;
        }
        .hero-right {
            max-width: 400px;
            text-align: right;
        }
        .hero-right .desc {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .hero-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .btn-green {
            background-color: #23d160;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-dark {
            background-color: #222;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .web-link {
            color: #88f;
            font-size: 14px;
            text-decoration: underline;
        }

        /* TRAE Work */
        .trae-work-section {
            background-color: #000;
            text-align: center;
            padding: 60px 20px 0;
        }
        .trae-work-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .trae-work-title .green-text {
   background: linear-gradient(90deg, #23d160, #b0ecd7);
   -webkit-background-clip: text;
   background-clip: text;
   color: transparent;
 }
        
        .trae-work-title .beta-tag {
            background-color: #111;
            color: #61cd85;
            font-size: 12px;
            padding: 3px 6px;
            border: 1px solid #54c178;
            border-radius: 2px;
        }
        .trae-work-subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-explore {
            background-color: #23d160;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 40px;
        }

        /* Video */
        .video-section {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .video-container {
            width: 60%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        body {
   background: #000 url("bg.jpg") no-repeat center center;
   background-size: cover;
 }
    </style>
