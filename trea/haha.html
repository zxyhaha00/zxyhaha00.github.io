<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <title>TRAE Work</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      /* 点阵背景效果，更清晰 */
      background-image: radial-gradient(rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
    }
    .flex { display: flex; }
    .flex-between { justify-content: space-between; }
    .flex-center { align-items: center; }

    /* 导航下拉默认隐藏 */
    .drop-menu {
      display: none;
      z-index: 999;
    }
    .drop-box:hover .drop-menu {
      display: block;
    }

    /* 主体通用样式 */
    .hero-section {
      text-align: center;
      padding: 48px 20px 24px;
    }
    /* 关键修改：文字固定绿色渐变，去掉动画 */
    .hero-badge {
      display: inline-block;
      font-size: 12px;
      margin-bottom: 8px;
      /* 固定绿色渐变，不做动画 */
      background: linear-gradient(90deg, #27c95c, #88e888);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .hero-title {
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(90deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 24px;
    }
    .input-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      margin-bottom: 32px;
    }
    .prompt-input {
      width: 100%;
      max-width: 600px;
      background-color: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .prompt-input::placeholder {
      color: #666;
    }
    .button-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    /* 一行三个 整齐两排 */
    .cards-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      padding: 0 20px 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card-item {
      width: calc((100% - 32px) / 3);
      background-color: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 16px;
      font-size: 13px;
      color: #aaa;
    }
    .footer-section {
      text-align: center;
      padding: 0 20px 64px;
    }
    .btn-gradient {
      padding: 10px 32px;
      border: none;
      border-radius: 4px;
      background: linear-gradient(90deg, #23d160, #00c6ff);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
