<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>个人主页</title>
     <style>
         /* 页面基础样式 */
         body {
             font-family: "Microsoft YaHei", sans-serif;
             background: #000;
             color: #fff;
             position: relative;
             overflow-x: hidden;
             margin: 0;
             padding: 0;
         }
         /* 星星闪烁动画（多节奏，更自然） */
         @keyframes twinkle {
             0%, 100% { opacity: 0.2; }
             50% { opacity: 1; }
         }
         @keyframes twinkle2 {
             0%, 100% { opacity: 0.4; }
             50% { opacity: 0.8; }
         }
         /* 星空背景：超密集星星 */
         body::before {
             content: "";
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             background-image: 
                 radial-gradient(1px 1px at 25px 5px, #fff, transparent),
                 radial-gradient(1px 1px at 50px 25px, #fff, transparent),
                 radial-gradient(1px 1px at 125px 20px, #fff, transparent),
                 radial-gradient(1px 1px at 50px 75px, #fff, transparent),
                 radial-gradient(1px 1px at 15px 125px, #fff, transparent),
                 radial-gradient(2px 2px at 90px 40px, #fff, transparent),
                 radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                 radial-gradient(2px 2px at 160px 120px, #fff, transparent),
                 radial-gradient(1.5px 1.5px at 200px 60px, #fff, transparent),
                 radial-gradient(1.5px 1.5px at 230px 100px, #fff, transparent),
                 radial-gradient(1px 1px at 260px 140px, #fff, transparent),
                 radial-gradient(1px 1px at 300px 30px, #fff, transparent),
                 radial-gradient(1px 1px at 330px 70px, #fff, transparent),
                 radial-gradient(2px 2px at 360px 110px, #fff, transparent),
                 radial-gradient(1px 1px at 390px 150px, #fff, transparent),
                 radial-gradient(1px 1px at 420px 50px, #fff, transparent),
                 radial-gradient(2px 2px at 450px 90px, #fff, transparent),
                 radial-gradient(1px 1px at 480px 130px, #fff, transparent),
                 radial-gradient(1.5px 1.5px at 510px 170px, #fff, transparent),
                 radial-gradient(1px 1px at 540px 40px, #fff, transparent);
             background-size: 600px 200px;
             background-repeat: repeat;
             opacity: 0.9;
             z-index: -1;
             animation: twinkle 2s infinite ease-in-out;
         }
         /* 第二层星星，增加密度和层次感 */
         body::after {
             content: "";
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             background-image: 
                 radial-gradient(1px 1px at 10px 10px, #fff, transparent),
                 radial-gradient(1px 1px at 30px 50px, #fff, transparent),
                 radial-gradient(1px 1px at 70px 30px, #fff, transparent),
                 radial-gradient(1px 1px at 90px 90px, #fff, transparent),
                 radial-gradient(1px 1px at 110px 130px, #fff, transparent),
                 radial-gradient(1px 1px at 150px 70px, #fff, transparent),
                 radial-gradient(1px 1px at 170px 170px, #fff, transparent),
                 radial-gradient(1px 1px at 210px 110px, #fff, transparent),
                 radial-gradient(1px 1px at 230px 190px, #fff, transparent),
                 radial-gradient(1px 1px at 270px 150px, #fff, transparent);
             background-size: 400px 200px;
             background-repeat: repeat;
             opacity: 0.7;
             z-index: -2;
             animation: twinkle2 3s infinite ease-in-out;
         }
         .student-id {
             font-size: 24px;
             margin: 30px;
         }
         
         .claude-link, .article-link {
             display: block;
             font-size: 20px;
             color: #4fc3f7;
             text-decoration: none;
             margin: 20px 30px;
         }
         .claude-link:hover, .article-link:hover {
             color: #81d4fa;
         }
     </style>
 </head>
