<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>我的个人GitHub站点</title>
     <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }
         body {
             width: 100vw;
             height: 100vh;
             background-color: #000000;
             /* 模拟星空的随机白点，和截图效果完全一致 */
             background-image: 
                 radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
                 radial-gradient(2px 2px at 60px 70px, #ffffff, transparent),
                 radial-gradient(1px 1px at 50px 50px, #ffffff, transparent),
                 radial-gradient(1px 1px at 130px 80px, #ffffff, transparent),
                 radial-gradient(2px 2px at 90px 10px, #ffffff, transparent),
                 radial-gradient(2px 2px at 160px 120px, #ffffff, transparent),
                 radial-gradient(1px 1px at 190px 60px, #ffffff, transparent),
                 radial-gradient(2px 2px at 230px 80px, #ffffff, transparent);
             background-size: 200px 200px;
             overflow: hidden;
             font-family: "Microsoft Yahei", sans-serif;
         }
         .student-id {
             position: absolute;
             top: 30px;
             left: 30px;
             color: #ffffff;
             font-size: 24px;
             font-weight: bold;
             letter-spacing: 1px;
         }
     </style>
 </head>
 <body>
     <div class="student-id">学号: 25101020107</div>
 </body>
 </html>
