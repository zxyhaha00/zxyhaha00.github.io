<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>我的个人GitHub站点</title>
     <style>
         /* 全局样式，可自由修改 */
         body {
             margin: 0;
             padding: 0;
             min-height: 100vh;
             /* 保留你之前的星空背景效果，也可以换成纯色 */
             background: #000;
             overflow: hidden;
         }
         /* 学号固定在左上角 */
         .student-id {
             position: absolute;
             top: 20px;
             left: 20px;
             color: #fff;
             font-size: 20px;
             font-weight: bold;
             z-index: 999;
         }
         /* 星空效果（保留你之前的动态效果） */
         .star {
             position: absolute;
             background: #fff;
             border-radius: 50%;
             animation: twinkle 2s infinite;
         }
         @keyframes twinkle {
             0%, 100% { opacity: 0.3; }
             50% { opacity: 1; }
         }
     </style>
 </head>
 <body>
     <!-- 左上角学号 -->
     <div class="student-id">学号：25101020107</div>
     <!-- 星空动态效果（可保留/删除） -->
     <script>
         // 生成随机星星
         const stars = document.body;
         for (let i = 0; i < 100; i++) {
             const star = document.createElement('div');
             star.className = 'star';
             star.style.width = Math.random() * 3 + 'px';
             star.style.height = star.style.width;
             star.style.left = Math.random() * 100 + '%';
             star.style.top = Math.random() * 100 + '%';
             star.style.animationDelay = Math.random() * 2 + 's';
             stars.appendChild(star);
         }
     </script>
 </body>
 </html>
