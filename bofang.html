<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <title>网页设计播放按钮</title>
     <style>
         body {
             margin: 0;
             min-height: 100vh;
             background: linear-gradient(180deg, #6A4C93 0%, #F8A5C2 100%);
             display: flex;
             justify-content: center;
             align-items: center;
         }
         .player-card {
             width: 400px;
             height: 400px;
             background: linear-gradient(135deg, #8854d0 0%, #a55eea 100%);
             border-radius: 24px;
             display: flex;
             justify-content: center;
             align-items: center;
             box-shadow: 0 15px 40px rgba(0,0,0,0.3);
         }
         .video-frame {
             width: 320px;
             height: 240px;
             background: #2d3436;
             border-radius: 8px;
             display: flex;
             justify-content: center;
             align-items: center;
             /* 加粗黑框，颜色和内部底色完全一致 */
             border: 10px solid #2d3436;
         }
         .video-preview {
             width: 280px;
             height: 200px;
             background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
             border-radius: 4px;
             display: flex;
             justify-content: center;
             align-items: center;
         }
         .play-btn {
             width: 120px;
             height: 120px;
             background: white;
             border-radius: 50%;
             display: flex;
             justify-content: center;
             align-items: center;
             cursor: pointer;
         }
         .play-btn::after {
             content: '';
             width: 0;
             height: 0;
             border-top: 30px solid transparent;
             border-bottom: 30px solid transparent;
             border-left: 44px solid #2d3436;
             margin-left: 6px;
         }
     </style>
 </head>
 <body>
     <div class="player-card">
         <div class="video-frame">
             <div class="video-preview">
                 <div class="play-btn"></div>
             </div>
         </div>
     </div>
 </body>
 </html>
