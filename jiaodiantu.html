<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex实现焦点图Banner</title>
    <style>
        /* 外层banner容器：弹性布局，相对定位方便箭头悬浮 */
        .banner-wrap {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* banner图片 */
        .banner-img {
            width: 100%;
            display: block;
        }
        /* 左右箭头通用样式：弹性居中 */
        .arrow {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        /* 左箭头靠左 */
        .arrow-left {
            left: 20px;
        }
        /* 右箭头靠右 */
        .arrow-right {
            right: 20px;
        }
        .arrow img {
            width: 100%;
            height: 100%;
        }
        /* 底部圆点指示器容器：flex横向排列、居中 */
        .point-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px; /* flex子元素间距 */
        }
        /* 圆点默认样式 */
        .point {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #b3e6f9;
            cursor: pointer;
        }
        /* 当前激活圆点（深色） */
        .point.active {
            background: #00b4e6;
        }
    </style>
</head>
<body>
    <div class="banner-wrap">
        <!-- 左箭头 -->
        <div class="arrow arrow-left">
            <img src="arrow1.png" alt="左箭头">
        </div>
        <!-- Banner主图 -->
        <img class="banner-img" src="banner1.jpg" alt="世界地球日">
        <!-- 右箭头 -->
        <div class="arrow arrow-right">
            <img src="arrow2.png" alt="右箭头">
        </div>
        <!-- 底部指示器圆点 flex布局 -->
        <div class="point-box">
            <div class="point"></div>
            <div class="point active"></div>
            <div class="point"></div>
            <div class="point"></div>
        </div>
    </div>
</body>
</html>
