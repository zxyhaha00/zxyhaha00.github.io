<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <title>网上书城-用户注册</title>
     <style>
         .box {
             width: 450px;
             border: 1px solid #347edb;
             margin: 30px auto;
         }
         .top-title {
             background: #777;
             color: #fff;
             text-align: center;
             padding: 8px;
             font-size: 20px;
             letter-spacing: 8px;
         }
         .form-head {
             background: #e0e0e0;
             padding: 6px 15px;
             border-bottom: 1px solid #999;
         }
         /* 此处修改：背景色改为浅蓝色 #cce5ff */
         .form-content {
             background: #cce5ff;
             padding: 20px;
         }
         table {
             margin: 0 auto;
         }
         td {
             padding: 8px 5px;
         }
         input[type="text"],input[type="password"],input[type="email"] {
             width: 180px;
         }
         .submit-btn {
             width: 180px;
             background: #444;
             color: #fff;
             border: none;
             padding: 4px;
         }
     </style>
 </head>
 <body>
     <div class="box">
         <div class="top-title">网上书城</div>
         <div class="form-head">➕ 注册新用户</div>
         <div class="form-content">
             <form action="#" method="post">
                 <table>
                     <tr>
                         <td><label>👤用户名</label></td>
                         <td><input type="text" name="username"></td>
                     </tr>
                     <tr>
                         <td><label>🔑密码</label></td>
                         <td><input type="password" name="pwd"></td>
                     </tr>
                     <tr>
                         <td><label>🔑确认密码</label></td>
                         <td><input type="password" name="repwd"></td>
                     </tr>
                     <tr>
                         <td><label>📩电子邮箱</label></td>
                         <td><input type="email" name="email"></td>
                     </tr>
                     <tr>
                         <td colspan="2" align="center">
                             <input type="submit" value="注册新用户" class="submit-btn">
                         </td>
                     </tr>
                 </table>
             </form>
         </div>
     </div>
 </body>
 </html>
