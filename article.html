<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <title>如何培养认真严谨的习惯</title>
     <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }
         body {
             font-family: "Microsoft Yahei", sans-serif;
             max-width: 1200px;
             margin: 30px auto;
             padding: 0 20px;
         }
         h1 {
             text-align: center;
             font-size: 48px;
             color: #666;
             margin-bottom: 20px;
         }
         h1 span {
             color: #217ad9;
         }
         .meta-info {
             text-align: center;
             font-size: 22px;
             color: #666;
             margin-bottom: 30px;
         }
         .meta-info span {
             color: #217ad9;
         }
         .container {
             display: flex;
             align-items: center;
             gap: 40px;
         }
         .banner-img {
             width: 400px;
         }
         .list-content {
             flex: 1;
             line-height: 2.2;
             font-size: 20px;
         }
         .list-item::before {
             content: "♠";
             margin-right: 10px;
             color: #000;
         }
         .list-item .highlight {
             color: #ff3333;
             font-weight: bold;
         }
     </style>
 </head>
 <body>
     <h1>如何培养<span>认真严谨</span>的习惯</h1>
     <div class="meta-info">
         时间:<span>2022年02月21日17时26分</span> &nbsp;&nbsp;来源:<span>思政教育</span>
     </div>
     <div class="container">
         <img src="banner.jpg" alt="态度决定一切 细节决定成败"class="banner-img">
         <div class="list-content">
             <div class="list-item"><span class="highlight">反复确认</span>，做任何事情都要照顾到每一个细节并反复确认，<span class="highlight">要有一种能在脑子里“虚拟”整个事件过程的能力，</span>确保所有的节点都正常。</div>
             <div class="list-item">想尽办法<span class="highlight">努力让不可能变为可能</span>只有佣金全力做了，才算是努力</div>
             <div class="list-item">结果导向<span class="highlight">一切以结果为导向，任何事情都是你的名片。</span>还要思考你的结果和过程是否满足所有和你配合的人的需求,</div>
             <div class="list-item">学会假设<span class="highlight">了解周围比你强的人，观察他们的做事方法。</span>遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</div>
         </div>
     </div>
 </body>
 </html>
