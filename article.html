<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>如何培养认真严谨的习惯</title>
     <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }
         body {
             font-family: "Microsoft YaHei", sans-serif;
             background: #fff;
             padding: 40px 20px;
         }
         /* 整体居中卡片 */
         .card {
             display: flex;
             align-items: center;
             justify-content: center;
             gap: 20px;
             max-width: 1200px;
             margin: 0 auto;
         }
         /* 左侧图片 */
         .banner-img {
             width: 400px; 
             height: auto;
             object-fit: contain;
             flex-shrink: 0;
         }
         /* 右侧文字容器 */
         .text-wrap {
             flex: 1;
             text-align: center;
         }
         /* 标题样式（匹配截图的蓝色高亮） */
         h1 {
             font-size: 36px;
             color: #666;
             margin-bottom: 15px;
         }
         h1 .blue-text {
             color: #3488eb; /* 和截图一致的蓝色 */
         }
         /* 时间来源 - 蓝色 */
         .meta-info {
             font-size: 16px;
             color: #66a3d2; /* 截图的蓝色 */
             margin-bottom: 25px;
             text-align：center;
         }
      .meta-info .label{
       color:#000000;
      }
          
         
         /* 列表内容 */
         .list-content {
             font-size: 18px;
             line-height: 1.8;
             text-align: left;
         }
         .list-item {
             margin: 12px 0;
         }
         .list-item::before {
             content: "◆";
             margin-right: 10px;
             color: #333;
         }
         .highlight {
             color: #ff3333;
             font-weight: bold;
         }
     </style>
 </head>
 <body>
     <div class="card">
         <img src="banner.jpg" alt="态度决定一切 细节决定成败"class="banner-img">
         <div class="text-wrap">
             <h1>如何培养<span class="blue-text">认真严谨</span>的习惯</h1>
             <div class="meta-info"><span class="label">时间</span>:2022年02月21日17时26分 &nbsp;&nbsp;<span class="label">来源</span>:思政教育</div>
             <div class="list-content">
                 <div class="list-item"><span class="highlight">反复确认，</span>做任何事情都要照顾到每一个细节并反复确认，<span class="highlight">要有一种能在脑子里“虚拟”整个事件过程的能力，确保所有的节点都正常。</span></div>
                 <div class="list-item"><span class="highlight">想尽办法努力让不可能变为可能，</span>只有倾尽全力做了，才算是努力。</div>
                 <div class="list-item"><span class="highlight">结果导向，一切以结果为导向，</span>任何事情都是你的名片。还要思考你的结果和过程是否满足所有和你配合的人的需求。</div>
                 <div class="list-item">学会假设，了解周围比你强的人，观察他们的做事方法。遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</div>
             </div>
         </div>
     </div>
 </body>
 </html>
